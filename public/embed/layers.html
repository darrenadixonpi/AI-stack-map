<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Stack Map — Layers (embed)</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #4f46e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1020;
          --fg: #e5e7eb;
          --muted: #9ca3af;
          --border: #233044;
          --accent: #8b9bff;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      h1 { font-size: 1rem; margin: 0 0 0.5rem; }
      .stack { display: flex; flex-direction: column; gap: 4px; }
      .layer {
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        border-radius: 6px;
        padding: 8px 10px;
      }
      .layer .name { font-weight: 600; font-size: 0.9rem; }
      .layer .desc { color: var(--muted); font-size: 0.78rem; }
      footer { margin-top: 0.6rem; font-size: 0.75rem; }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <h1>The AI stack, in layers</h1>
    <div class="stack" id="stack"></div>
    <footer>
      Source: <a href="/" target="_blank" rel="noopener">AI Stack Map</a> · embeddable widget
    </footer>
    <script>
      var layers = [
        ['Product / UX', 'Your app, copilot, or workflow UI'],
        ['Orchestration', 'Agents, chains, graphs, workflows'],
        ['Capabilities', 'RAG, tools, memory, multimodal, fine-tune'],
        ['Model access', 'APIs, local inference, routing, gateways'],
        ['Data', 'Vectors, documents, feature stores, labeling'],
        ['Build & ship', 'SDKs, hosting, observability, eval'],
        ['Governance', 'Keys, policy, cost caps, safety filters'],
      ]
      var root = document.getElementById('stack')
      layers.forEach(function (l) {
        var d = document.createElement('div')
        d.className = 'layer'
        d.innerHTML = '<div class="name">' + l[0] + '</div><div class="desc">' + l[1] + '</div>'
        root.appendChild(d)
      })
    </script>
  </body>
</html>
