<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2130"/>
      <stop offset="100%" stop-color="#181b27"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Left: Title block -->
  <text x="72" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#f0f2f7" letter-spacing="-1">AI Stack Map</text>
  <text x="72" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8892a4" letter-spacing="0">Navigate models, RAG, agents, and observability</text>
  <text x="72" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8892a4">without drowning in hype.</text>

  <!-- Accent line under title -->
  <rect x="72" y="256" width="80" height="3" rx="2" fill="#6366f1"/>

  <!-- Stats row -->
  <g font-family="system-ui, -apple-system, sans-serif" fill="#c8cfe0">
    <text x="72"  y="320" font-size="32" font-weight="700" fill="#f0f2f7">52</text>
    <text x="72"  y="348" font-size="14" fill="#8892a4">stack tools</text>
    <text x="176" y="320" font-size="32" font-weight="700" fill="#f0f2f7">49</text>
    <text x="176" y="348" font-size="14" fill="#8892a4">enterprise apps</text>
    <text x="300" y="320" font-size="32" font-weight="700" fill="#f0f2f7">7</text>
    <text x="300" y="348" font-size="14" fill="#8892a4">stack layers</text>
  </g>

  <!-- Right: Layer stack diagram -->
  <!-- Layer card background -->
  <rect x="660" y="60" width="480" height="510" rx="16" fill="url(#cardBg)" stroke="#2d3148" stroke-width="1"/>

  <!-- Layer rows: y positions spaced 63px apart, starting at y=78 -->
  <!-- Product / UX — indigo -->
  <rect x="676" y="76"  width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="76"  width="6"   height="54" rx="3" fill="#6366f1"/>
  <text x="696" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Product / UX</text>
  <text x="696" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Chat UI · Workflow surfaces · App layer</text>

  <!-- Orchestration — violet -->
  <rect x="676" y="138" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="138" width="6"   height="54" rx="3" fill="#8b5cf6"/>
  <text x="696" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Orchestration</text>
  <text x="696" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Agents · Chains · Graph runtimes</text>

  <!-- Capabilities — cyan -->
  <rect x="676" y="200" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="200" width="6"   height="54" rx="3" fill="#06b6d4"/>
  <text x="696" y="231" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Capabilities</text>
  <text x="696" y="247" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">RAG · Tool calling · Fine-tuning · Memory</text>

  <!-- Model Access — amber -->
  <rect x="676" y="262" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="262" width="6"   height="54" rx="3" fill="#f59e0b"/>
  <text x="696" y="293" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Model Access</text>
  <text x="696" y="309" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">LLM APIs · Inference · Gateways</text>

  <!-- Data — emerald -->
  <rect x="676" y="324" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="324" width="6"   height="54" rx="3" fill="#10b981"/>
  <text x="696" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Data</text>
  <text x="696" y="371" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Vector DBs · Loaders · Labeling</text>

  <!-- Build & Ship — rose -->
  <rect x="676" y="386" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="386" width="6"   height="54" rx="3" fill="#f43f5e"/>
  <text x="696" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Build &amp; Ship</text>
  <text x="696" y="433" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">SDKs · Eval · Observability · Hosting</text>

  <!-- Governance — slate -->
  <rect x="676" y="448" width="448" height="54" rx="8" fill="#1e2130" stroke="#2d3148" stroke-width="1"/>
  <rect x="676" y="448" width="6"   height="54" rx="3" fill="#94a3b8"/>
  <text x="696" y="479" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Governance</text>
  <text x="696" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Policy · Cost caps · Moderation · Audit</text>

  <!-- Bottom label on card -->
  <text x="900" y="542" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3d4460" text-anchor="middle">7-layer model · Neutral · No vendor rankings</text>

  <!-- Bottom tagline -->
  <text x="72" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#3d4460">github.com/darrenadixonpi/AI-stack-map</text>
</svg>
