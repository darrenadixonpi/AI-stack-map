<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Navigate models, RAG, agents, harnesses, and observability without drowning in hype."
    />
    <title>AI Stack Map</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ai-stack-map-theme');
          document.documentElement.dataset.theme =
            t === 'light' || t === 'dark' || t === 'system' ? t : 'system';
        } catch (e) {
          document.documentElement.dataset.theme = 'system';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
